
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-bridge-proxy
  namespace: jumak-db-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hybrid-bridge
  template:
    metadata:
      labels:
        app: hybrid-bridge
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: w5  # Run on w5 where Tailscale is confirmed
      containers:
      - name: redis-socat
        image: alpine/socat
        command: ["socat", "TCP-LISTEN:6380,fork,bind=0.0.0.0", "TCP:100.92.250.55:6379"]
      - name: es-socat
        image: alpine/socat
        command: ["socat", "TCP-LISTEN:9201,fork,bind=0.0.0.0", "TCP:100.92.250.55:9200"]
---
apiVersion: v1
kind: Service
metadata:
  name: redis-bridge-svc
  namespace: jumak-db-ns
spec:
  selector:
    app: hybrid-bridge
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6380
---
apiVersion: v1
kind: Service
metadata:
  name: es-bridge-svc
  namespace: jumak-db-ns
spec:
  selector:
    app: hybrid-bridge
  ports:
    - name: es
      protocol: TCP
      port: 9200
      targetPort: 9201
