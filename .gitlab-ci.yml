        - backend/requirements.txt

build-recommend:
  <<: *build_definition
  stage: build-batch-3
  variables:
    SERVICE_NAME: "backend-recommend"
    SERVICE_KEY: "recommend"
    SERVICE_PATH: "backend/services/recommend"
    IMAGE_NAME: "$IMAGE_RECOMMEND"
  rules:
