        - backend/requirements.txt

build-ocr:
  <<: *build_definition
  stage: build-batch-2
  variables:
    SERVICE_NAME: "backend-ocr"
    SERVICE_KEY: "ocr"
    SERVICE_PATH: "backend/services/ocr"
    IMAGE_NAME: "$IMAGE_OCR"
  rules:
    - if: $FORCE_BUILD == "true"
    - if: $CI_PIPELINE_SOURCE == "web"
    - changes:
