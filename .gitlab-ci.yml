        - backend/requirements.txt

# Batch 3: Stats, Recommend, Frontend
build-stats:
  <<: *build_definition
  stage: build-batch-3
  variables:
    SERVICE_NAME: "backend-stats"
    SERVICE_KEY: "stats"
    SERVICE_PATH: "backend/services/stats"
    IMAGE_NAME: "$IMAGE_STATS"
  rules:
