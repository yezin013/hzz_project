        - backend/requirements.txt

build-frontend:
  stage: build-batch-3
  tags: [shell]
  before_script:
    - "echo 'Logging into AWS ECR...'"
    - "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin $AWS_REGISTRY"
    - "git config --global user.email ci@jumak.local"
    - "git config --global user.name GitLab-CI"
  script:
    - "echo Building Frontend..."
    - "cd frontend"
    - "docker build -t \"$IMAGE_FRONTEND:$IMAGE_TAG\" ."
    - "docker push \"$IMAGE_FRONTEND:$IMAGE_TAG\""
    - "touch ../built_frontend.txt"
  after_script:
    - "docker logout \"$AWS_REGISTRY\" || true"
  artifacts:
    paths:
      - built_*.txt
  rules:
    - if: $FORCE_BUILD == "true"
    - if: $CI_PIPELINE_SOURCE == "web"
    - changes:
        - frontend/**/*

# =========================================================
# 📝 Update Manifests (Smart Update)
# =========================================================
update-manifests:
  stage: update-manifest
  tags: [shell]
  # Remove needs to avoid error when optional jobs are not created
  # It will wait for previous stages by default
  before_script:
    # Force cleanup of potential root-owned files from previous runs using docker
    - "docker run --rm -v \"$PWD:/app\" -w /app python:3.9-slim rm -rf gitops-repo || true"
    - "git config --global user.email ci@jumak.local"
    - "git config --global user.name GitLab-CI"
  script:
    # Run the python script inside a docker container to avoid dependency issues regarding python installation on runner
    - |
      docker run --rm \
        -v "$PWD:/app" \
        -w "/app" \
        -e GITOPS_REPO="$GITOPS_REPO" \
        -e GITOPS_BRANCH="$GITOPS_BRANCH" \
        -e GITHUB_TOKEN="$GITHUB_TOKEN" \
        -e TARGET_ENV="$TARGET_ENV" \
        -e IMAGE_TAG="$IMAGE_TAG" \
        -e IMAGE_FRONTEND="$IMAGE_FRONTEND" \
        -e IMAGE_CORE="$IMAGE_CORE" \
        -e IMAGE_SEARCH="$IMAGE_SEARCH" \
        -e IMAGE_CHATBOT="$IMAGE_CHATBOT" \
        -e IMAGE_CONTENT="$IMAGE_CONTENT" \
        -e IMAGE_OCR="$IMAGE_OCR" \
        -e IMAGE_STATS="$IMAGE_STATS" \
        -e IMAGE_RECOMMEND="$IMAGE_RECOMMEND" \
        -e HARBOR_REGISTRY="$AWS_REGISTRY" \
        -e HARBOR_PROJECT="$AWS_PROJECT" \
        python:3.9-slim \
        sh -c "apt-get update && apt-get install -y git wget && \
               wget -q https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.0.0/kustomize_v5.0.0_linux_amd64.tar.gz && \
               tar -xzf kustomize_v5.0.0_linux_amd64.tar.gz && \
               chmod +x kustomize && \
               mv kustomize /usr/local/bin/ && \
               python backend/scripts/update_manifests.py"

  # --- (추가) GitLab Environments에 "ops" 환경을 보이게 해서 대시보드처럼 쓰기 ---
  environment:
    name: ops
    url: https://monitor.hanzanzu.cloud/
    on_stop: stop-ops

# --- (추가) GitLab Environment stop 버튼/상태용 (실제 중지는 ArgoCD에서) ---
stop-ops:
  stage: update-manifest
  tags: [shell]
  script:
    - 'echo "Stop is handled in ArgoCD. This job is only for GitLab Environment UI."'
  when: manual
  environment:
    name: ops
    action: stop

# --- (추가) Tag push 시 Release 자동 생성 ---
auto-release:
  stage: update-manifest
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - 'echo "Auto creating release for tag: $CI_COMMIT_TAG"'
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "$CI_COMMIT_TAG"
    description: "Auto generated release for $CI_COMMIT_TAG"
