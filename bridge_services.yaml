
apiVersion: v1
kind: Service
metadata:
  name: redis-bridge
  namespace: jumak-db-ns
spec:
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6380
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-bridge
  namespace: jumak-db-ns
subsets:
  - addresses:
      - ip: 192.168.0.188
    ports:
      - port: 6380
---
apiVersion: v1
kind: Service
metadata:
  name: es-bridge
  namespace: jumak-db-ns
spec:
  ports:
    - protocol: TCP
      port: 9200
      targetPort: 9201
---
apiVersion: v1
kind: Endpoints
metadata:
  name: es-bridge
  namespace: jumak-db-ns
subsets:
  - addresses:
      - ip: 192.168.0.188
    ports:
      - port: 9201
